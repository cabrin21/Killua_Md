<input id="phone" placeholder="243XXXXXXXXX">
<button onclick="gen()">Generate</button>
<h2 id="code"></h2>
<script>
async function gen(){
let r=await fetch('/api/session/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:phone.value})})
let d=await r.json()
code.innerText=d.code
}
</script>
