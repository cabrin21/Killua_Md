<script>
async function pair() {
  let number = document.getElementById("number").value;

  // nettoyage + vérification
  number = number.replace(/\D/g, '');
  if (!number.startsWith("243")) {
    alert("Numéro invalide (ex: 243XXXXXXXXX)");
    return;
  }

  try {
    let res = await fetch('/api/session/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone: number })
    });

    let data = await res.json();

    if (data.success) {
      document.getElementById("code").innerText = "CODE : " + data.code;
    } else {
      document.getElementById("code").innerText = data.message || "Erreur";
    }

  } catch (err) {
    document.getElementById("code").innerText = "Erreur serveur";
    console.error(err);
  }
}
</script>
