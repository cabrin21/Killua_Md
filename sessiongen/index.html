<!DOCTYPE html>
<html>
<head>
<title>KILLUA PANEL</title>
<style>
body {
  background:#05070d;
  color:white;
  text-align:center;
  font-family:Arial;
}

.box {
  background:#0d1117;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  margin:auto;
  margin-top:40px;
}

input, button {
  padding:12px;
  width:90%;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#00ffa6;
}

.code {
  font-size:28px;
  color:#00ffa6;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="box">
<h2>⚡ KILLUA XD V2</h2>

<input id="phone" placeholder="243XXXXXXXXX">
<button onclick="gen()">Generate Code</button>

<div class="code" id="code"></div>
<div id="status"></div>
</div>

<script>
let sessionId = null

async function gen() {
  const phone = document.getElementById("phone").value

  const res = await fetch('/api/session/request', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ phone })
  })

  const data = await res.json()

  if(data.success){
    sessionId = data.sessionId
    document.getElementById("code").innerText = data.code
    check()
  } else {
    alert(data.message)
  }
}

async function check(){
  if(!sessionId) return

  const res = await fetch('/api/session/status/' + sessionId)
  const data = await res.json()

  document.getElementById("status").innerText =
    data.status

  if(data.status !== "connected"){
    setTimeout(check,2000)
  } else {
    document.getElementById("status").innerText =
      "✅ CONNECTED"
  }
}
</script>

</body>
</html>
