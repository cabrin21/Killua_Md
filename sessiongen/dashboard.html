<!DOCTYPE html>
<html>
<head>
<title>KILLUA DASHBOARD</title>

<style>
body {
  background:#05070d;
  color:white;
  font-family:Arial;
}

.container {
  width:90%;
  max-width:900px;
  margin:auto;
  margin-top:30px;
}

.card {
  background:#0d1117;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

button {
  padding:8px;
  border:none;
  border-radius:8px;
  background:red;
  color:white;
}

.session {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>⚡ KILLUA PANEL</h2>

<div class="card">
<h3>📊 Stats</h3>
<p id="count">Sessions: 0</p>
</div>

<div class="card">
<h3>📱 Active Sessions</h3>
<div id="sessions"></div>
</div>

</div>

<script>
async function loadSessions(){
  const res = await fetch('/api/sessions')
  const data = await res.json()

  document.getElementById("count").innerText =
    "Sessions: " + data.length

  let html = ""

  data.forEach(s => {
    html += `
    <div class="session">
      <span>${s.id}</span>
      <button onclick="kill('${s.id}')">❌</button>
    </div>
    `
  })

  document.getElementById("sessions").innerHTML = html
}

async function kill(id){
  await fetch('/api/session/delete/' + id)
  loadSessions()
}

setInterval(loadSessions,2000)
</script>

</body>
</html>
